name: Create Release
on:
  workflow_dispatch:
    inputs:
      workflow_run_url:
        description: 'URL of the workflow run containing artifacts to upload (e.g., https://github.com/owner/repo/actions/runs/123456789)'
        required: true
        type: string
      draft:
        description: 'Mark as draft'
        required: false
        type: boolean
        default: false
jobs:
  # Upload artifacts as release assets
  upload-release-assets:
    uses: externpro/externpro/.github/workflows/upload-release-assets.yml@github-release
    secrets:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    with:
      workflow_run_url: ${{ github.event.inputs.workflow_run_url }}
      artifact_pattern: "*.tar.xz"
      draft: ${{ github.event.inputs.draft }}
